; Example PlatformIO configuration for this project.
; Copy this file to platformio.ini and adjust credentials/pins as needed.

[platformio]
default_envs = esp32c3_supermini

[env:esp32c3_supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
board_build.partitions = partitions_ota_1_5m.csv
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1

[env:esp32c3_supermini_ota]
extends = env:esp32c3_supermini
upload_protocol = espota
upload_port = 192.168.8.1
upload_flags =
  --auth=changeme
