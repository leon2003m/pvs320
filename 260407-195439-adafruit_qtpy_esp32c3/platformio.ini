; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32c3_supermini

[env:esp32c3_supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
board_build.partitions = partitions_ota_1_5m.csv
lib_deps =
  h2zero/NimBLE-Arduino @ ^2.3.6
  bblanchon/ArduinoJson @ ^7.1.0
  https://github.com/igorantolic/ai-esp32-rotary-encoder.git
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1

[env:esp32c3_supermini_ota]
extends = env:esp32c3_supermini
upload_protocol = espota
upload_port = 192.168.8.1
upload_flags =
  --auth=changeme
